<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <head>
        <meta charset="UTF-8">
        <title>ユーザーの投稿一覧</title>

        <style>
            /* 🌌 ベースの背景（ディープインディゴ世界観） */
        body {
            background-color: #001a41;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
        }

        /* 📦 中央配置のコンテナ */
        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* 👤 タイトル */
        h2 {
            font-size: 1.6rem;
            margin-bottom: 8px;
        }

        /* 🔗 戻るナビゲーション */
        .nav-back {
            margin-bottom: 24px;
        }
        .nav-back a {
            color: #3b82f6;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s;
        }
        .nav-back a:hover {
            color: #60a5fa;
            text-decoration: underline;
        }

        /* ✨ ガラスモルフィズムの投稿カード */
        .post-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* 📋 投稿のメタ情報（ユーザー名と日付） */
        .post-meta {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 0.85rem;
            color: #9ca3af;
        }
        .user-name {
            font-weight: bold;
            color: #e5e7eb;
        }
        /* ➕ <style>タグの中に追記：ユーザー名リンクの装飾 */
        .user-name a {
            color: #e5e7eb;
            text-decoration: none;
            transition: color 0.2s;
        }
        .user-name a:hover {
            color: #60a5fa;
            text-decoration: underline;
        }

        /* 💬 投稿本文 */
        .post-content {
            margin: 0;
            font-size: 1rem;
            line-height: 1.6;
            white-space: pre-wrap;
            color: #f3f4f6;
        }

        /* 📭 投稿がゼロの時のメッセージ */
        .empty-message {
            text-align: center;
            color: #9ca3af;
            padding: 40px 0;
            font-size: 0.95rem;
        }
        </style>
    </head>

    <body>
        <div class="container">

            <h2 th:text="${targetUser != null} ? '👤 ' + ${targetUser.name} + ' の投稿一覧' : '👤 ユーザーの投稿一覧'"></h2>

            <div class="nav-back">
                <a th:href="@{/posts}">➔ 🌍 全体のタイムラインに戻る</a>
            </div>

            <div th:each="post : ${posts}" class="post-card">
                <div class="post-meta">
                    <span class="user-name">
                        <a th:href="@{/posts/user/{id}(id=${post.user.id})}" th:text="${post.user.name}" ></a>
                    </span>
                    <span th:text="${#temporals.format(post.createdAt, 'yyyy/MM/dd（E） HH:mm:ss')}"></span>
                </div>
                <p th:text="${post.content}" class="post-content"></p>
            </div>

            <div th:if="${posts.isEmpty()}" class="empty-message">
                まだ投稿がありません。
            </div>

        </div>
    </body>
</html>
