<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${targetUser != null} ? '👤 ' + ${targetUser.name} + ' の投稿一覧' : '👤 ユーザーの投稿一覧'"></title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="centered-layout">
    <div class="container">

        <div th:replace="~{header :: common-header(~{})}"></div>

        <main id="main-content">
            <h2 th:text="${targetUser != null} ? '👤 ' + ${targetUser.name} + ' の投稿一覧' : '👤 ユーザーの投稿一覧'"></h2>

            <div th:if="${loginUser != null && loginUser.id != targetUser.id}" class="follow-wrapper">

                <form th:if="${loginUser.following.contains(targetUser)}"
                    th:action="@{/users/{id}/unfollow(id=${targetUser.id})}" method="post">
                    <button type="submit" class="follow">
                        🤝 フォロー中 (解除する)
                    </button>
                </form>

                <form th:unless="${loginUser.following.contains(targetUser)}"
                    th:action="@{/users/{id}/follow(id=${targetUser.id})}" method="post">
                    <button type="submit" class="unfollow">
                        ➕ フォローする
                    </button>
                </form>
            </div>


            <div th:each="post : ${posts}" class="post-card">
                <div class="post-meta">
                    <span class="user-name">
                        <span th:text="${post.user.icon}" class="user-icon"></span>
                        <a th:href="@{/posts/user/{id}(id=${post.user.id})}" th:text="${post.user.name}"></a>
                    </span>
                    <span th:text="${#temporals.format(post.createdAt, 'yyyy/MM/dd（E）HH:mm:ss')}"></span>
                </div>
                <p th:text="${post.content}" class="post-content"></p>

                <div class="post-actions">
                    <button type="button" class="like-button" th:data-post-id="${post.id}"
                        th:classappend="${post.likedByMe} ? 'liked' : ''">
                        <span class="like-icon" th:text="${post.likedByMe} ? '❤️' : '🖤'">🖤</span>
                        <span class="like-count" th:text="${post.likeCount}">0</span>
                    </button>

                    <button type="button" class="vote-button" th:data-post-id="${post.id}"
                        th:data-is-own="${loginUser != null && post.user.id == loginUser.id}"
                        th:classappend="${post.votedByMe} ? 'voted' : ''">
                        <span class="vote-icon" th:text="${post.votedByMe} ? '★' : '☆'">☆</span>
                        <span class="vote-count" th:text="${post.voteCount}">0</span>
                    </button>
                </div>
            </div>

            <div th:if="${posts.isEmpty()}" class="empty-message">
                まだ投稿がありません
            </div>
        </main>

    </div>

    <div id="toast-container"></div>

    <script th:src="@{/js/global.js}"></script>
</body>

</html>
