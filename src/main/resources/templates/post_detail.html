<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <head>
        <meta charset="UTF-8">
        <title>投稿詳細</title>
        <link rel="stylesheet" th:href="@{/css/style.css}">
    </head>

    <body>
        <div class="container">
            <div th:replace="~{header :: common-header(~{})}"></div>

            <div class="parent-post">
                <div class="post-header">
                    <span th:text="${post.user.icon}"></span>
                    <span class="user-name" th:text="${post.user.name}"></span>
                    <span class="post-time" th:text="${#temporals.format(post.createdAt, 'yyyy/MM/dd（E）HH:mm')}"></span>
                </div>
                <p class="post-content" th:text="${post.content}"></p>

                <div class="post-actions">
                    <button type="button" class="like-button" th:data-post-id="${post.id}"
                        th:classappend="${post.likedByMe} ? 'liked' : ''">
                        <span class="like-icon" th:text="${post.likedByMe} ? '❤️' : '🖤'">🖤</span>
                        <span class="like-count" th:text="${post.likeCount}">0</span>
                    </button>

                    <button type="button" class="vote-button" th:data-post-id="${post.id}"
                        th:data-is-own="${loginUser != null && post.user.id == loginUser.id}" 
                        th:classappend="${post.votedByMe} ? 'voted' : ''">
                        <span class="vote-icon" th:text="${post.votedByMe} ? '★' : '☆'">☆</span>
                        <span class="vote-count" th:text="${post.voteCount}">0</span>
                    </button>
                </div>
            </div>

            <div class="comment-section">
                <h3>💬 返信・コメント</h3>

                <form th:action="@{/posts/{id}/comments(id=${post.id})}" class="comment-form" method="post">
                    <textarea name="content" placeholder="返信をつぶやく..." required></textarea>
                    <button type="submit">💬 返信する</button>
                </form>

                <div th:if="${#lists.isEmpty(comments)}" class="no-comment">
                    まだ返信はありません。最初の返信を送りましょう！
                </div>

                <div th:each="comment : ${comments}" class="comment-card">
                    <div class="comment-meta">
                        <span th:text="${comment.user.icon}"></span>
                        <span class="comment-user" th:text="${comment.user.name}"></span>
                        <span class="post-time" th:text="${#temporals.format(comment.createdAt, 'MM/dd（E）HH:mm')}"></span>
                    </div>
                    <p class="comment-content" th:text="${comment.content}"></p>
                </div>
            </div>
        </div>

        <div id="toast-container"></div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {

            // =====================
            // ★ Voteボタンの制御
            // =====================
            function showWarningToast(message) {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                toast.classList.add('toast-body');
                toast.textContent = message;
                container.appendChild(toast);
                setTimeout(() => toast.remove(), 2500);
            }

            document.querySelectorAll('[data-is-own="true"]').forEach(btn => btn.classList.add('own-post-btn'));

            // 1. ハッシュタグ自動リンク処理
            const postElements = document.querySelectorAll('.post-content-text span');
            postElements.forEach(function (element) {
                const text = element.textContent;
                const hashtagRegex = /[#＃][A-Za-z0-9ぁ-んァ-ヶ一-龠ー_]+/g;
                if (!hashtagRegex.test(text)) return;

                element.innerHTML = text.replace(hashtagRegex, function (match) {
                    const tagName = match.substring(1).toLowerCase();
                    return `<a href="/tags/${tagName}" class="hashtag-text">${match}</a>`;
                });
            });

            // ======================
            // ❤️ いいねボタンの非同期処理
            // ======================
            document.querySelectorAll('.like-button').forEach(button => {
                button.addEventListener('click', async (e) => {
                    const btn = e.currentTarget;
                    const postId = btn.getAttribute('data-post-id');
                    btn.disabled = true;

                    try {
                        // 新設した LikeApiController を叩く
                        const response = await fetch(`/api/posts/${postId}/like`, {
                            method: 'POST'
                        });

                        if (response.ok) {
                            const result = await response.json(); // { likes: X, liked: true/false }

                            const countSpan = btn.querySelector('.like-count');
                            const iconSpan = btn.querySelector('.like-icon');

                            // 数字を最近に書き換え
                            countSpan.textContent = result.likes;

                            // 状態に応じてハートとクラスをトグル
                            if (result.liked) {
                                iconSpan.textContent = '❤️';
                                btn.classList.add('liked');
                            } else {
                                iconSpan.textContent = '🖤';
                                btn.classList.remove('liked');
                            }
                        }
                    } catch (error) {
                        console.error('いいねの非同期通信に失敗しました:', error);
                    } finally {
                        btn.disabled = false;
                    }
                });
            });

            // =====================
            // ★ Voteボタンの非同期処理
            // =====================
            document.querySelectorAll('.vote-button').forEach(button => {
                button.addEventListener('click', async (e) => {
                    const btn = e.currentTarget;

                    // 自分の投稿なら通信させずにトーストを出して終了
                    if (btn.getAttribute('data-is-own') === 'true') {
                        showWarningToast('🏛️ 自身の提出法案に「投票」することはできません');
                        return;
                    }

                    const postId = btn.getAttribute('data-post-id');
                    btn.disabled = true;

                    try {
                        const response = await fetch(`/api/posts/${postId}/vote`, {
                            method: 'POST'
                        });

                        if (response.ok) {
                            const result = await response.json();
                            const icon = btn.querySelector('.vote-icon');
                            const countSpan = btn.querySelector('.vote-count');

                            countSpan.textContent = result.voteCount;

                            if (result.voted) {
                                icon.textContent = '★';
                                btn.classList.add('voted');
                            } else {
                                icon.textContent = '☆';
                                btn.classList.remove('voted');
                            }
                        }
                    } catch (error) {
                        console.error('Voteの非同期通信に失敗しました:', error);
                    } finally {
                        btn.disabled = false;
                    }
                });
            });

        });
    </script>
    </body>
</html>
