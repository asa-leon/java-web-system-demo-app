<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <head>
        <meta charset="UTF-8">
        <title>投稿詳細</title>
        <style>
body {
            background-color: #001a41;
            color: #f3f4f6;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
        }
        h2 {
            color: #ffffff;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }
        
        /* 親の投稿カード */
        .parent-post {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 30px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
        }
        .user-name { color: #60a5fa; font-weight: bold; }
        .post-time { color: #9ca3af; font-size: 0.8rem; margin-left: auto; }
        .post-content { color: #ffffff; font-size: 1.15rem; line-height: 1.6; margin: 0; }

        /* コメントエリア */
        .comment-section {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }
        .comment-card {
            background: rgba(255, 255, 255, 0.03);
            border-left: 3px solid #38bdf8; /* 左端にアクセントライン */
            padding: 14px 16px;
            margin-bottom: 12px;
            border-radius: 0 8px 8px 0;
        }
        .comment-meta { display: flex; gap: 8px; font-size: 0.85rem; margin-bottom: 6px; }
        .comment-user { color: #e5e7eb; font-weight: bold; }
        .comment-content { color: #d1d5db; font-size: 0.95rem; line-height: 1.5; margin: 0; }

        /* コメントフォーム */
        .comment-form {
            margin-bottom: 24px;
        }
        .comment-form textarea {
            width: 100%;
            height: 80px;
            padding: 12px;
            background: rgba(0, 26, 65, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #ffffff;
            font-size: 0.95rem;
            outline: none;
            resize: none;
            box-sizing: border-box;
            margin-bottom: 8px;
        }
        .comment-form button {
            padding: 8px 16px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .comment-form button:hover { background: #1d4ed8; }

        .no-comment {
            color: #9ca3af; font-size: 0.9rem; text-align: center; padding: 20px 0;
        }
        </style>
    </head>

    <body>
        <div class="container">
            <div th:replace="~{header :: common-header(~{})}"></div>

            <div class="parent-post">
                <div class="post-header">
                    <span th:text="${post.user.icon}"></span>
                    <span class="user-name" th:text="${post.user.name}"></span>
                    <span class="post-time" th:text="${#temporals.format(post.createdAt, 'yyyy/MM/dd（E）HH:mm')}"></span>
                </div>
                <p class="post-content" th:text="${post.content}"></p>
            </div>

            <div class="comment-section">
                <h3>💬 返信・コメント</h3>

                <form th:action="@{/posts/{id}/comments(id=${post.id})}" class="comment-form" method="post">
                    <textarea name="content" placeholder="返信をつぶやく..." required></textarea>
                    <button type="submit">💬 返信する</button>
                </form>

                <div th:if="${#lists.isEmpty(comments)}" class="no-comment">
                    まだ返信はありません。最初の返信を送りましょう！
                </div>

                <div th:each="comment : ${comments}" class="comment-card">
                    <div class="comment-meta">
                        <span th:text="${comment.user.icon}"></span>
                        <span class="comment-user" th:text="${comment.user.name}"></span>
                        <span class="post-time" th:text="${#temporals.format(comment.createdAt, 'MM/dd（E）HH:mm')}"></span>
                    </div>
                    <p class="comment-content" th:text="${comment.content}"></p>
                </div>
            </div>
        </div>
    </body>
</html>
