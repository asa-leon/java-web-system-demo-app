<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>新規投稿</title>
    <style>
        /* 全体のベース（ディープインディゴの背景） */
        body {
            background-color: #001a41;
            color: #f3f4f6;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* フォーム全体を囲むコンテナ（ガラスモルフィズム風） */
        .form-container {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h2 {
            color: #ffffff;
            font-size: 1.6rem;
            margin-top: 0;
            margin-bottom: 24px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #9ca3af;
            font-size: 0.9rem;
            margin-bottom: 8px;
            font-weight: 500;
        }

        /* セレクトボックスのカスタムスタイル */
        select {
            width: 100%;
            padding: 12px;
            background-color: rgba(0, 26, 65, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #ffffff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
            cursor: pointer;
        }
        select:focus {
            border-color: #60a5fa;
        }

        /* テキストエリアのカスタムスタイル */
        textarea {
            width: 100%;
            padding: 14px;
            background-color: rgba(0, 26, 65, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #ffffff;
            font-size: 1rem;
            outline: none;
            resize: none;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        textarea:focus {
            border-color: #60a5fa;
        }

        /* バリデーションエラーメッセージ */
        .error-message {
            color: #f87171;
            font-size: 0.85rem;
            margin-top: 6px;
            margin-bottom: 0;
        }

        /* つぶやくボタン（鮮やかなインディゴブルー） */
        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: #2563eb;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 10px;
        }
        .submit-btn:hover {
            background-color: #3b82f6;
        }
        .submit-btn:active {
            transform: scale(0.98);
        }

        /* フッターの戻るリンク */
        .footer-links {
            text-align: center;
            margin-top: 24px;
        }
        .footer-links a {
            color: #38bdf8;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .footer-links a:hover {
            color: #7dd3fc;
            text-decoration: underline;
        }

        .tags {
            margin-top: 12px;
        }

        .tag-guide {
            display: block; color: #9ca3af; font-size: 0.85rem; margin-bottom: 8px;
        }

        .tag-helper-btn {
            background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 16px; color: #38bdf8; padding: 5px 14px; font-size: 0.85rem; cursor: pointer; transition: all 0.2s ease;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>🚀 SNS 新規投稿</h2>

        <form th:action="@{/posts/create}" th:object="${post}" method="post">
            
            <div class="form-group">
                <label for="userId">投稿ユーザーを選択</label>
                <select id="userId" name="userId">
                    <option th:each="u : ${users}" th:value="${u.id}" th:text="${u.name}">
                        ユーザー名
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label for="content">いまどうしてる？（140文字以内）</label>
                <textarea id="content" th:field="*{content}" rows="4" placeholder="ここに文章を入力してください..."></textarea>
                
                <div th:if="${!#lists.isEmpty(allTags)}" class="tags">
                    <span class="tag-guide">
                        🏷️ タグをタップして本文に追加：
                    </span>
                    <div class="tags-group">
                        <button th:each="tag : ${allTags}"
                            type="button"
                            class="tag-helper-btn"
                            th:data-tag-name="${tag.name}">
                            <span th:text="'#' + ${tag.name}"></span>
                        </button>
                    </div>
                </div>

                <p th:if="${#fields.hasErrors('content')}" th:errors="*{content}" class="error-message"></p>
            </div>

            <button type="submit" class="submit-btn">つぶやく</button>
        </form>

        <div class="footer-links">
            <a th:href="@{/posts}">🔙 タイムラインに戻る</a>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {

            const textarea = document.getElementById('content');
            const tagButtons = document.querySelectorAll('.tag-helper-btn');

            tagButtons.forEach(function(button) {
                button.addEventListener('click', function() {
                    // カスタム属性「data-tag-name」から、シャープなしのタグ名を取得
                    const tagName = button.getAttribute('data-tag-name');

                    // 挿入する用の文字列を作成（連続で押しやすいように末尾にスペースを空ける）
                    const tagText = `#${tagName} `;

                    // 現在の入力内容の末尾にガチャンと結合
                    textarea.value = textarea.value + tagText;

                    // 入力したら、すぐに文字の続きが打てるように入力欄にフォーカスを戻す
                    textarea.focus();
                });
            });
        });
    </script>
</body>
</html>
