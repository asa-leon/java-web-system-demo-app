<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>机上院 - 法案審議一覧</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
	<div class="container wide-layout">
		
			<div th:replace="~{header :: common-header(~{})}"></div>

		<main class="main-content">
			<h2>🏛️ 法案審議一覧</h2>


			<div class="search-box">
				<form th:action="@{/bills}" method="get">
					<input type="text" name="keyword" th:value="${keyword}" placeholder="投稿を検索...">
					<button type="submit">🔍 検索</button>
					<a th:if="${keyword != null && !keyword.isEmpty()}" th:href="@{/bills}">❌</a>
				</form>

				<div class="tab">
					<a th:href="@{/bills}"
						th:class="${currentTab == 'all' || currentTab == null} ? 'tab-active' : 'tab-inactive'">
						🌐 すべての投稿
					</a>
					<a th:href="@{/bills/following}"
						th:class="${currentTab == 'following'} ? 'tab-active' : 'tab-inactive'">
						🤝 フォロー中
					</a>
				</div>
			</div>

			<div th:if="${#lists.isEmpty(bills)}" class="empty-message">
				<p>まだ投稿はありません。</p>
			</div>

			<div th:each="bill : ${bills}" class="post-card">
				<div class="post-header">
					<span class="user-name">
						<div class="user-avatar-area">
							<div class="user-avatar">
								<img th:if="${bill.user != null && bill.user.avatarUrl != null}"
									th:src="${bill.user.avatarUrl}" alt="icon">
								<span th:if="${bill.user == null || bill.user.avatarUrl == null}">👤</span>
							</div>
							<a th:href="@{/users/{id}(id=${bill.user.id})}" th:text="${bill.user.name}"></a>
						</div>

					</span>
					<span class="user-id" th:text="'(ID: ' + ${bill.user.id} + ')'"></span>

					<!-- ステータス表示バッヂを設置 -->
					<span th:text="${bill.status.displayName}" class="status-badge"
						th:class="(
							${bill.status.name() == 'UNDER_DELIBERATION'} 
							? 'under-deliberation'
							: (
								${bill.status.name() == 'PASSED'}
								? 'passed'
								: ''
							)
						)">

					</span>

					<span class="post-time"
						th:text="${#temporals.format(bill.createdAt, 'yyyy/MM/dd（E）HH:mm:ss')}"></span>
				</div>

				<div class="post-content-container">
					<a th:href="@{/bills/{id}(id=${bill.id})}" class="whole-text-anchor"></a>
					<div class="post-content-text">
						<!-- 法案名（太字）と提案理由を表示 -->
						<h3 th:text="${bill.title}" class="bill-title"></h3>
						<p th:text="${bill.description}" class="bill-description"></p>
					</div>
				</div>

				<div class="post-actions">
					<button type="button" class="like-button" th:data-bill-id="${bill.id}"
						th:classappend="${bill.likedByMe} ? 'liked' : ''">
						<span class="like-icon" th:text="${bill.likedByMe} ? '❤️' : '🖤'">🖤</span>
						<span class="like-count" th:text="${bill.likeCount}">0</span>
					</button>

					<button type="button" class="vote-button" th:data-bill-id="${bill.id}"
						th:data-is-own="${loginUser != null && bill.user.id == loginUser.id}"
						th:classappend="${bill.votedByMe} ? 'voted' : ''">
						<span class="vote-icon" th:text="${bill.votedByMe} ? '★' : '☆'">☆</span>
						<span class="vote-count" th:text="${bill.voteCount}">0</span>
					</button>
				</div>

				<form th:action="@{/bills/{id}/delete(id=${bill.id})}" method="post" style="margin: 0;">
					<button type="submit" class="delete-btn" onclick="return confirm('本当にこの投稿を削除しますか？')">
						🗑️ 削除
					</button>
				</form>
			</div>
		</main>

		<asiade class="sidebar">
			<div class="trend-card">
				<h3 class="trend-title">⚡ いまのトレンド</h3>
				<p th:if="${#lists.isEmpty(trends)}" class="no-trends">まだトレンドはありません。</p>
				<div th:each="t : ${trends}" class="trend-item">
					<a th:href="@{/tags/{tagName}(tagName=${t.name})}" class="trend-link" th:text="'#' + ${t.name}"></a>
				</div>
			</div>
		</asiade>
	</div>

	<div id="toast-container"></div>

	<script>
		document.addEventListener("DOMContentLoaded", function () {

			// =====================
			// ★ Voteボタンの制御
			// =====================
			function showWarningToast(message) {
				const container = document.getElementById('toast-container');
				const toast = document.createElement('div');
				toast.classList.add('toast-body');
				toast.textContent = message;
				container.appendChild(toast);
				setTimeout(() => toast.remove(), 2500);
			}

			document.querySelectorAll('[data-is-own="true"]').forEach(btn => btn.classList.add('own-post-btn'));

			// 1. ハッシュタグ自動リンク処理
			const postElements = document.querySelectorAll('.post-content-text p');
			postElements.forEach(function (element) {
				const text = element.textContent;
				const hashtagRegex = /[#＃][A-Za-z0-9ぁ-んァ-ヶ一-龠ー_]+/g;
				if (!hashtagRegex.test(text)) return;

				element.innerHTML = text.replace(hashtagRegex, function (match) {
					const tagName = match.substring(1).toLowerCase();
					return `<a href="/tags/${tagName}" class="hashtag-text">${match}</a>`;
				});
			});

			// ======================
			// ❤️ いいねボタンの非同期処理
			// ======================
			document.querySelectorAll('.like-button').forEach(button => {
				button.addEventListener('click', async (e) => {
					const btn = e.currentTarget;
					const billId = btn.getAttribute('data-bill-id');
					btn.disabled = true;

					try {
						// 新設した LikeApiController を叩く
						const response = await fetch(`/api/bills/${billId}/like`, {
							method: 'POST'
						});

						if (response.ok) {
							const result = await response.json(); // { likes: X, liked: true/false }

							const countSpan = btn.querySelector('.like-count');
							const iconSpan = btn.querySelector('.like-icon');

							// 数字を最近に書き換え
							countSpan.textContent = result.likes;

							// 状態に応じてハートとクラスをトグル
							if (result.liked) {
								iconSpan.textContent = '❤️';
								btn.classList.add('liked');
							} else {
								iconSpan.textContent = '🖤';
								btn.classList.remove('liked');
							}
						}
					} catch (error) {
						console.error('いいねの非同期通信に失敗しました:', error);
					} finally {
						btn.disabled = false;
					}
				});
			});

			// =====================
			// ★ Voteボタンの非同期処理
			// =====================
			document.querySelectorAll('.vote-button').forEach(button => {
				button.addEventListener('click', async (e) => {
					const btn = e.currentTarget;

					// 自分の投稿なら通信させずにトーストを出して終了
					if (btn.getAttribute('data-is-own') === 'true') {
						showWarningToast('🏛️ 自身の提出法案に「投票」することはできません');
						return;
					}

					const billId = btn.getAttribute('data-bill-id');
					btn.disabled = true;

					try {
						const response = await fetch(`/api/bills/${billId}/vote`, {
							method: 'POST'
						});

						if (response.ok) {
							const result = await response.json();
							const icon = btn.querySelector('.vote-icon');
							const countSpan = btn.querySelector('.vote-count');

							countSpan.textContent = result.voteCount;

							if (result.voted) {
								icon.textContent = '★';
								btn.classList.add('voted');
							} else {
								icon.textContent = '☆';
								btn.classList.remove('voted');
							}
						}
					} catch (error) {
						console.error('Voteの非同期通信に失敗しました:', error);
					} finally {
						btn.disabled = false;
					}
				});
			});

		});
	</script>
</body>

</html>
