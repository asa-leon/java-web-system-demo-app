<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>机上院 - 法案詳細審議</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
	<div class="container wide-layout">
		<header th:replace="~{header :: common-header(~{})}"></header>

		<main id="main-content">
			<h2>🏛️ 法案詳細審議</h2>


			<!-- 法案メインカード -->
			<div class="post-card">
				<div class="post-header">
					<span class="user-name">
						<div class="user-avatar-area">
							<div class="user-avatar">
								<img th:if="${bill.user != null && bill.user.avatarUrl != null}"
									th:src="${bill.user.avatarUrl}" alt="icon">
								<span th:if="${bill.user == null || bill.user.avatarUrl == null}">👤</span>
							</div>
							<a th:href="@{/users/{id}(id=${bill.user.id})}" th:text="${bill.user.name}"></a>
						</div>
					</span>
					<span class="user-id" th:text="'(ID: )' + ${bill.user.id} + ')'"></span>

					<!-- ステータスバッヂ（一覧画面と統一） -->
					<span th:text="${bill.status.displayName}" class="status-badge" th:class="(
							${bill.status.name() == 'UNDER_DELIBERATION'} 
							? 'under-deliberation'
							: (
								${bill.status.name() == 'PASSED'}
								? 'passed'
								: ''
							)
						)">
					</span>

					<span class="post-time" th:text="${#temporals.format(bill.createdAt, 'yyyy/MM/dd（E）HH:mm')}"></span>
				</div>

				<!-- 法案本文表示エリア -->
				<div class="post-content-container type-detail">
					<div class="post-content-text">
						<h3 th:text="${bill.title}" class="bill-title wider"></h3>
						<p th:text="${bill.description}" class="bill-description wider"></p>
					</div>
				</div>

				<!-- 非同期アクションボタン群 -->
				<div class="post-actions">
					<button type="button" class="like-button" th:data-bill-id="${bill.id}"
						th:classappend="${bill.likedByMe} ? 'liked' : ''">
						<span class="like-icon" th:text="${bill.likedByMe} ? '❤️' : '🖤'">🖤</span>
						<span class="like-count" th:text="${bill.likeCount}">0</span>
					</button>

					<button type="button" class="vote-button" th:data-bill-id="${bill.id}"
						th:data-is-own="${loginUser != null && bill.user.id == loginUser.id}"
						th:classappend="${bill.votedByMe} ? 'voted' : ''">
						<span class="vote-icon" th:text="${bill.votedByMe} ? '★' : '☆'">☆</span>
						<span class="vote-count" th:text="${bill.voteCount}">0</span>
					</button>
				</div>

				<!-- 削除（撤回）ボタン -->
				<form th:action="@{/bills/{id}/delete(id=${bill.id})}" method="post">
					<button type="submit" class="delete-btn" onclick="return confirm('本当にこの法案を撤回（削除）しますか？')">
						🗑️ 撤回
					</button>
				</form>
			</div>

			<!-- 審議コメント（議論）セクション -->
			<section class="comment-section">
				<h3>💬 審議コメント・質疑応答</h3>

				<!-- コメント投稿フォーム -->
				<form th:action="@{/bills/{id}/comments(id=${bill.id})}" th:object="${commentForm}" method="post"
					class="comment-form">

					<div class="form-group">
						<textarea th:field="*{content}" rows="3" class="form-control"
							placeholder="この法案に対する意見や質疑を入力してください..."></textarea>
						<p class="error-message" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></p>
					</div>
					<div class="form-bottom-bar">
						<!-- 質疑通告チェックボックス -->
						 <div class="form-check">
							<input type="checkbox" class="form-check-input" th:field="*{question}" 
								id="isQuestionCheck">
							<label for="isQuestionCheck" class="form-check-label question-label">
								質疑通告として送信（提案者に答弁を求めます）
							</label>
						 </div>

						<button type="submit" class="submit-btn comment">💬 発言（通告）する</button>
					</div>
				</form>

				<div class="comment-list">
					<div th:if="${#lists.isEmpty(bill.comments)}" class="empty-message">
						<p>まだこの法案に対するコメントはありません。最初の議論を始めましょう。</p>
					</div>

					<div th:each="comment : ${bill.comments}" 
						class="comment-card" 
						th:classappend="${comment.isQuestion} ? 'question-card' : (${comment.parent != null} ? 'reply-card' : '')">

						<!-- 返信（答弁）の場合のヘッダー補足 -->
						<div th:if="${comment.parent != null}" class="reply-target-info">
							<span>💬 <strong th:text="${comment.parent.user.name}">質問者</strong> 議員の質疑に対する答弁</span>
						</div>

						<div class="comment-meta">
							<span class="comment-user">
								<a th:href="@{/users/{id}(id=${comment.user.id})}" th:text="${comment.user.name}"></a>
							</span>
							<span class="user-id" th:text="'ID: ' + ${comment.user.id} + ')'"></span>

							<!-- 質疑通告バッヂ（質疑通告コメントの場合のみ表示 -->
							<div th:if="${comment.isQuestion}" class="question-status-badge">
								<span th:if="${!comment.isAnswered}" class="badge badge-waiting">⚠️ 答弁待ち</span>
								<span th:if="${comment.isAnswered}" class="badge badge-answered">✅ 答弁完了</span>
							</div>

							<span class="post-time" th:text="${#temporals.format(comment.createdAt, 'MM/dd（E）HH:mm')}"></span>
						</div>

						<!-- コメント本文（改行を維持、ハッシュタグ自動リンク対象） -->
						<div class="comment-content">
							<p th:text="${comment.content}"></p>
						</div>

						<!-- 提案者専用の答弁アクション領域 -->
						<div th:if="${session.loginUser != null && bill.user.id == session.loginUser.id && comment.isQuestion && !comment.isAnswered}"
							class="answer-action-area">
							<button type="button" class="reply-toggle-btn" th:data-comment-id="${comment.id}">
								🎤 この質疑に答弁する
							</button>

							<!-- 返信/答弁入力フォーム（初期は非表示） -->
							<div th:id="'reply-form-' + ${comment.id}" class="reply-form-container">
								<form th:action="@{/bills/{id}/comments(id=${bill.id})}" th:object="${commentForm}" method="post">
									<input type="hidden" name="parentId" th:value="${comment.id}">
									<div class="form-group">
										<textarea name="content" rows="2" class="form-control" placeholder="提案者としての答弁を入力してください..."></textarea>
									</div>
									<div class="reply-form-actions">
										<button type="submit" class="submit-btn answer-btn">答弁を送信する</button>
									</div>
								</form>
							</div>
						</div>
					</div>
				</div>
			</section>

			<div class="nav-back">
				<a th:href="@{/bills}">🔙 審議一覧に戻る</a>
			</div>
		</main>

		<aside id="sidebar">
			<div class="trend-card">
				<h3 class="trend-title">⚡ いまのトレンド</h3>
				<p th:if="${#lists.isEmpty(trends)}" class="no-trends">まだトレンドはありません。</p>
				<div th:each="t : ${trends}" class="trend-item">
					<a th:href="@{/tags/{tagName}(tagName=${t.name})}" class="trend-link" th:text="'#' + ${t.name}"></a>
				</div>
			</div>
		</aside>
	</div>

	<div id="toast-container"></div>

	<script th:src="@{/js/global.js}"></script>
</body>

</html>
