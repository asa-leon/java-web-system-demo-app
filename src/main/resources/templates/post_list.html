<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>タイムライン</title>

    <style>
        body {
            background-color: #001a41;
            color: #f3f4f6;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: flex;
            gap: 30px;
        }

        .main-content {
            flex: 1;
            max-width: 600px;
        }

        .sidebar {
            width: 260px;
            flex-shrink: 0;
        }

        .trend-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            position: sticky;
            top: 20px;
        }

        .trend-title {
            color: #ffffff;
            font-size: 1.1rem;
            margin-top: 0;
            margin-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 8px;
        }

        .trend-item {
            margin-bottom: 14px;
        }

        .trend-item:last-child {
            margin-bottom: 0;
        }

        .trend-link {
            color: #38bdf8;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.95rem;
            display: block;
            transition: color 0.2s;
        }

        .trend-link:hover {
            color: #7dd3fc;
            text-decoration: underline;
        }

        .no-trends {
            color: #9ca3af;
            font-size: 0.85rem;
            margin: 0;
        }

        h2 {
            color: #ffffff;
            font-size: 1.8rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .post-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .user-name {
            color: #60a5fa;
            font-weight: bold;
        }

        .user-name a {
            color: #e5e7eb;
            text-decoration: none;
            transition: color 0.2s;
        }

        .user-name a:hover {
            color: #60a5fa;
            text-decoration: underline;
        }

        .user-name .user-icon {
            font-size: 1.2rem;
        }

        .user-id {
            color: #9ca3af;
            font-size: 0.8rem;
        }

        .post-time {
            color: #9ca3af;
            font-size: 0.8rem;
            margin-left: auto;
        }

        .delete-btn {
            color: #fca5a5;
            background: transparent;
            border: 1px solid rgba(248, 113, 113, 0.4);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            background: rgba(248, 113, 113, 0.2);
            border-color: #f87171;
            color: #ffffff;
        }

        .empty-message {
            color: #9ca3af;
            text-align: center;
            padding: 40px 0;
        }

        .search-box {
            margin-bottom: 20px;
        }

        .search-box form {
            display: flex;
            gap: 8px;
        }

        .search-box form input[type="text"] {
            flex: 1;
            padding: 10px 14px;
            background: rgba(0, 26, 65, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #ffffff;
            font-size: 0.95rem;
            outline: none;
        }

        .search-box form button[type="submit"] {
            padding: 10px 16px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-box form a {
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.1);
            color: #e5e7eb;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.95rem;
            line-height: 1.2;
        }

        /* ==========================================
           ✨ アクションエリア（❤️と★の横並び設定）
           ========================================== */
        .post-actions {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
        }

        /* ❤️ 感情いいねボタンの共通デザイン */
        .like-button {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            color: #ffffff;
            padding: 6px 14px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .like-button.liked {
            color: #ff6584 !important;
            background: rgba(239, 68, 68, 0.15) !important;
            border-color: #ff6584 !important;
        }

        .like-button:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.4);
            transform: scale(1.05);
        }

        .like-button:active {
            transform: scale(0.95);
        }

        /* ★ 国家投票ボタンの共通デザイン */
        .vote-button {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            color: #88a0c0;
            padding: 6px 14px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .vote-button:hover {
            background: rgba(255, 215, 0, 0.15);
            border-color: rgba(255, 215, 0, 0.4);
            color: #ffffff;
            transform: scale(1.05);
        }

        .vote-button:active {
            transform: scale(0.95);
        }

        /* 💡 投票済（voted）の時のゴールド発光デザイン */
        .vote-button.voted {
            color: #ffd700 !important;
            background: rgba(255, 215, 0, 0.2) !important;
            border-color: #ffd700 !important;
            text-shadow: 0 0 8px rgba(255, 215, 0, 0.6);
        }

        .own-post-btn {
            cursor: default !important;
        }

        .vote-button:disabled {
            opacity: 0.5;
            /* ボタンを半透明にする */
            cursor: not-allowed;
            /* マウスカーソルを禁止マークにする */
            transform: none !important;
            /* ホバー時の拡大アニメーションを無効化 */
            background: rgba(255, 255, 255, 0.02);
        }

        .vote-button:disabled:hover {
            border-color: rgba(255, 255, 255, 0.15);
            /* ホバーしても枠線の色を変えない */
            color: inherit;
        }

        .tab {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 8px;
        }

        .tab a {
            font-size: 0.95rem;
        }

        .tab-active {
            color: #ffffff;
            font-weight: bold;
            text-decoration: none;
            padding: 6px 16px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
        }

        .tab-inactive {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            padding: 6px 16px;
            transition: all 0.2s;
        }

        .tab-inactive:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
        }

        .post-content-container {
            position: relative;
        }

        .post-content-container .whole-text-anchor {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .post-content-text {
            position: relative;
            z-index: 2;
            pointer-events: none;
            margin: 0 0 15px 0;
        }

        .hashtag-text {
            color: #38bdf8;
            text-decoration: none;
            font-weight: bold;
            pointer-events: auto;
        }

        #toast-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
        }

        .toast-body {
            background: rgba(239, 68, 68, 0.95);
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            margin-bottom: 10px;
            animation: fadeIn 0.3s ease, fadeOut 0.3s ease 2.2s forwards;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="main-content">
            <h2>💬 SNS タイムライン</h2>

            <div th:replace="~{header :: common-header(~{})}"></div>

            <div class="search-box">
                <form th:action="@{/posts}" method="get">
                    <input type="text" name="keyword" th:value="${keyword}" placeholder="投稿を検索...">
                    <button type="submit">🔍 検索</button>
                    <a th:if="${keyword != null && !keyword.isEmpty()}" th:href="@{/posts}">❌</a>
                </form>

                <div class="tab">
                    <a th:href="@{/posts}"
                        th:class="${currentTab == 'all' || currentTab == null} ? 'tab-active' : 'tab-inactive'">
                        🌐 すべての投稿
                    </a>
                    <a th:href="@{/posts/following}"
                        th:class="${currentTab == 'following'} ? 'tab-active' : 'tab-inactive'">
                        🤝 フォロー中
                    </a>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(posts)}" class="empty-message">
                <p>まだ投稿はありません。</p>
            </div>

            <div th:each="post : ${posts}" class="post-card">
                <div class="post-header">
                    <span class="user-name">
                        <span th:text="${post.user.icon}" class="user-icon"></span>
                        <a th:href="@{/posts/user/{id}(id=${post.user.id})}" th:text="${post.user.name}"></a>
                    </span>
                    <span class="user-id" th:text="'(ID: ' + ${post.user.id} + ')'"></span>
                    <span class="post-time"
                        th:text="${#temporals.format(post.createdAt, 'yyyy/MM/dd（E）HH:mm:ss')}"></span>
                </div>

                <div class="post-content-container">
                    <a th:href="@{/posts/{id}(id=${post.id})}" class="whole-text-anchor"></a>
                    <p class="post-content-text">
                        <span th:text="${post.content}"></span>
                    </p>
                </div>

                <div class="post-actions">
                    <button type="button" class="like-button" th:data-post-id="${post.id}"
                        th:classappend="${post.likedByMe} ? 'liked' : ''">
                        <span class="like-icon" th:text="${post.likedByMe} ? '❤️' : '🖤'">🖤</span>
                        <span class="like-count" th:text="${post.likeCount}">0</span>
                    </button>

                    <button type="button" class="vote-button" th:data-post-id="${post.id}"
                        th:data-is-own="${post.user.id == 2}" th:classappend="${post.votedByMe} ? 'voted' : ''">
                        <span class="vote-icon" th:text="${post.votedByMe} ? '★' : '☆'">☆</span>
                        <span class="vote-count" th:text="${post.voteCount}">0</span>
                    </button>
                </div>

                <form th:action="@{/posts/{id}/delete(id=${post.id})}" method="post" style="margin: 0;">
                    <button type="submit" class="delete-btn" onclick="return confirm('本当にこの投稿を削除しますか？')">
                        🗑️ 削除
                    </button>
                </form>
            </div>
        </div>

        <div class="sidebar">
            <div class="trend-card">
                <h3 class="trend-title">⚡ いまのトレンド</h3>
                <p th:if="${#lists.isEmpty(trends)}" class="no-trends">まだトレンドはありません。</p>
                <div th:each="t : ${trends}" class="trend-item">
                    <a th:href="@{/tags/{tagName}(tagName=${t.name})}" class="trend-link" th:text="'#' + ${t.name}"></a>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {

            // =====================
            // ★ Voteボタンの制御
            // =====================
            function showWarningToast(message) {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                toast.classList.add('toast-body');
                toast.textContent = message;
                container.appendChild(toast);
                setTimeout(() => toast.remove(), 2500);
            }

            document.querySelectorAll('[data-is-own="true"]').forEach(btn => btn.classList.add('own-post-btn'));

            // 1. ハッシュタグ自動リンク処理
            const postElements = document.querySelectorAll('.post-content-text span');
            postElements.forEach(function (element) {
                const text = element.textContent;
                const hashtagRegex = /[#＃][A-Za-z0-9ぁ-んァ-ヶ一-龠ー_]+/g;
                if (!hashtagRegex.test(text)) return;

                element.innerHTML = text.replace(hashtagRegex, function (match) {
                    const tagName = match.substring(1).toLowerCase();
                    return `<a href="/tags/${tagName}" class="hashtag-text">${match}</a>`;
                });
            });

            // ======================
            // ❤️ いいねボタンの非同期処理
            // ======================
            document.querySelectorAll('.like-button').forEach(button => {
                button.addEventListener('click', async (e) => {
                    const btn = e.currentTarget;
                    const postId = btn.getAttribute('data-post-id');
                    btn.disabled = true;

                    try {
                        // 新設した LikeApiController を叩く
                        const response = await fetch(`/api/posts/${postId}/like`, {
                            method: 'POST'
                        });

                        if (response.ok) {
                            const result = await response.json(); // { likes: X, liked: true/false }

                            const countSpan = btn.querySelector('.like-count');
                            const iconSpan = btn.querySelector('.like-icon');

                            // 数字を最近に書き換え
                            countSpan.textContent = result.likes;

                            // 状態に応じてハートとクラスをトグル
                            if (result.liked) {
                                iconSpan.textContent = '❤️';
                                btn.classList.add('liked');
                            } else {
                                iconSpan.textContent = '🖤';
                                btn.classList.remove('liked');
                            }
                        }
                    } catch (error) {
                        console.error('いいねの非同期通信に失敗しました:', error);
                    } finally {
                        btn.disabled = false;
                    }
                });
            });

            // =====================
            // ★ Voteボタンの非同期処理
            // =====================
            document.querySelectorAll('.vote-button').forEach(button => {
                button.addEventListener('click', async (e) => {
                    const btn = e.currentTarget;

                    // 自分の投稿なら通信させずにトーストを出して終了
                    if (btn.getAttribute('data-is-own') === 'true') {
                        showWarningToast('🏛️ 自身の提出法案に「投票」することはできません');
                        return;
                    }

                    const postId = btn.getAttribute('data-post-id');
                    btn.disabled = true;

                    try {
                        const response = await fetch(`/api/posts/${postId}/vote`, {
                            method: 'POST'
                        });

                        if (response.ok) {
                            const result = await response.json();
                            const icon = btn.querySelector('.vote-icon');
                            const countSpan = btn.querySelector('.vote-count');

                            countSpan.textContent = result.voteCount;

                            if (result.voted) {
                                icon.textContent = '★';
                                btn.classList.add('voted');
                            } else {
                                icon.textContent = '☆';
                                btn.classList.remove('voted');
                            }
                        }
                    } catch (error) {
                        console.error('Voteの非同期通信に失敗しました:', error);
                    } finally {
                        btn.disabled = false;
                    }
                });
            });

        });
    </script>
</body>

</html>
