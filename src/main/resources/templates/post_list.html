<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>タイムライン</title>

    <style>
        body {
            background-color: #001a41;
            color: #f3f4f6;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        h2 {
            color: #ffffff;
            font-size: 1.8rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* nav */
        .nav-links {
            margin-bottom: 20px;
        }

        .nav-links a {
            color: #38bdf8;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: #7dd3fc;
            text-decoration: underline;
        }

        /* post card (alike glass-morphism) */
        .post-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .user-name {
            color: #60a5fa;
            font-weight: bold;
        }
        .user-name a {
            color: #e5e7eb;
            text-decoration: none;
            transition: color 0.2s;
        }
        .user-name a:hover {
            color: #60a5fa;
            text-decoration: underline;
        }
        .user-name .user-icon {
            font-size: 1.2rem;
        }

        .user-id {
            color: #9ca3af;
            font-size: 0.8rem;
        }

        .post-time {
            color: #9ca3af;
            font-size: 0.8rem;
            margin-left: auto;
        }

        .post-content {
            color: #e5e7eb;
            font-size: 1.05rem;
            line-height: 1.5;
            margin: 0 0 15px 0;
            word-wrap: break-word;
        }

        .post-content a {
            color: #e5e7eb; text-decoration: none; transition: color 0.2s;
        }

        /* delete button */
        .delete-btn {
            color: #fca5a5;
            background: transparent;
            border: 1px solid rgba(248, 113, 113, 0.4);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0, 85rem;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            background: rgba(248, 113, 113, 0.2);
            border-color: #f87171;
            color: #ffffff;
        }

        /* empty-message */
        .empty-message {
            color: #9ca3af;
            text-align: center;
            padding: 40px 0;
        }

        /* search */
        .search-box {
            margin-bottom: 20px;
        }

        .search-box form {
            display: flex;
            gap: 8px;
        }

        .search-box form input[type="text"] {
            flex: 1;
            padding: 10px 14px;
            background: rgba(0, 26, 65, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #ffffff;
            font-size: 0.95rem;
            outline: none;
        }

        .search-box form button[type="submit"] {
            padding: 10px 16px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-box form a {
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.1);
            color: #e5e7eb;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.95rem;
            line-height: 1.2;
        }

        /* likes */
        .post-actions {
            display: flex; justify-content: flex-end; margin-top: 12px;
        }
        .post-actions form {
            margin: 0;
        }
        
        .like-button {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            color: #ffffff;
            padding: 6px 14px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }
        .like-button:hover {
            background: rgba(239, 68, 68, 0.2); /* ホバーするとほんのり赤くなる */
            border-color: rgba(239, 68, 68, 0.4);
            transform: scale(1.05); /* ほんの少し大きく */
        }
        .like-button:active {
            transform: scale(0.95); /* クリックした瞬間にクシュッと縮む小気味良さ */
        }

        .tab {
            display: flex; gap: 12px; margin-bottom: 24px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 8px;
        }

        .tab a {
            font-size: 0.95rem;
        }

        .tab-active {
            color: #ffffff; font-weight: bold; text-decoration: none; padding: 6px 16px; background: rgba(255, 255, 255, 0.15); border-radius: 20px;
        }

        .tab-inactive {
            color: rgba(255, 255, 255, 0.6); text-decoration: none; padding: 6px 16px; transition: all 0.2s;
        }

        .tab-inactive:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
        }

        .post-content-container {
            position: relative;
        }

        .post-content-container .whole-text-anchor {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }

        .post-content-text {
            position: relative; z-index: 2; pointer-events: none; margin: 0 0 15px 0;
        }

        .hashtag-text {
            color: #38bdf8; text-decoration: none; font-weight: bold; pointer-events: auto;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>💬 SNS タイムライン</h2>

        <div class="search-box">
            <form th:action="@{/posts}" method="get">
                <input type="text" name="keyword" th:value="${keyword}" placeholder="投稿を検索...">
                <button type="submit">
                    🔍 検索
                </button>

                <a th:if="${keyword != null && !keyword.isEmpty()}" th:href="@{/posts}">
                    ❌
                </a>
            </form>

            <div class="tab">
                <a th:href="@{/posts}"
                    th:class="${currentTab == 'all' || currentTab == null}
                        ? 'tab-active' 
                        : 'tab-inactive'">
                        🌐 すべての投稿
                </a>

                <a th:href="@{/posts/following}"
                    th:class="${currentTab == 'following'}
                        ? 'tab-active'
                        : 'tab-inactive'">
                    🤝 フォロー中
                </a>
            </div>
        </div>

        <div class="nav-links">
            <a th:href="@{/posts/new}">➕ 新しい文章を投稿する</a>
            <a th:href="@{/users}">👤 ユーザー一覧</a>
        </div>

        <div th:if="${#lists.isEmpty(posts)}" class="empty-message">
            <p>まだ投稿はありません。</p>
        </div>

        <div th:each="post : ${posts}" class="post-card">

            <div class="post-header">
                <span class="user-name">
                    <span th:text="${post.user.icon}" class="user-icon"></span>
                    <a th:href="@{/posts/user/{id}(id=${post.user.id})}" th:text="${post.user.name}"></a>
                </span>
                <span class="user-id" th:text="'(ID: ' + ${post.user.id} + ')'"></span>

                <span class="post-time" th:text="${#temporals.format(post.createdAt, 'yyyy/MM/dd（E）HH:mm:ss')}">
                </span>
            </div>

            <div class="post-content-container">
                <a th:href="@{/posts/{id}(id=${post.id})}" class="whole-text-anchor"></a>

                <p class="post-content-text">
                    <span th:text="${post.content}"></span>
                </p>
            </div>

            <div class="post-actions">
                <form th:action="@{/posts/{id}/like(id=${post.id})}" method="post">
                    <button type="submit" class="like-button">
                        ❤️ <span th:text="${post.likes}">0</span>
                    </button>
                </form>
            </div>

            <form th:action="@{/posts/{id}/delete(id=${post.id})}" method="post" style="margin: 0;">
                <button type="submit" class="delete-btn" onclick="return confirm('本当にこの投稿を削除しますか？')">
                    🗑️ 削除
                </button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // 1. 本文テキストが入っている <a> タグをすべて取得
            const postElements = document.querySelectorAll('.post-content-text span');

            postElements.forEach(function(element) {
                const text = element.textContent;
                const hashtagRegex = /[#＃][A-Za-z0-9ぁ-んァ-ヶ一-龠ー_]+/g;

                // 文中にハッシュタグが含まれていない場合は何もしない
                if (!hashtagRegex.test(text)) return;

                // #タグ の部分だけ <a> タグに置き換える
                // 「pointer-events: auto;」をつけることで、親の「none」を無視してクリック可能にする
                element.innerHTML = text.replace(hashtagRegex, function(match) {
                    const tagName = match.substring(1).toLowerCase();
                    return `<a href="/tags/${tagName}" class="hashtag-text">${match}</a>`;
                });
            });
        });
    </script>
</body>

</html>
