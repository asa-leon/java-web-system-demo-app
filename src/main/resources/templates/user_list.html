<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ユーザー一覧</title>
    <style>
        /* 全体のベース（ディープインディゴの背景） */
        body {
            background-color: #001a41;
            color: #f3f4f6;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        /* 中央のコンテンツコンテナ */
        .container {
            width: 100%;
            max-width: 650px;
        }

        h2 {
            color: #ffffff;
            font-size: 1.8rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ユーザーカード（ガラスモルフィズム風） */
        .user-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .user-meta {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-name {
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .user-name .user-icon {
            font-size: 1.2rem;
        }

        .user-badge {
            background-color: rgba(96, 165, 250, 0.15);
            color: #60a5fa;
            border: 1px solid rgba(96, 165, 250, 0.3);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .user-email {
            color: #9ca3af;
            font-size: 0.9rem;
        }

        /* 操作アクション（編集・削除ボタンエリア） */
        .user-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* 編集リンクボタン */
        .edit-link {
            color: #38bdf8;
            text-decoration: none;
            font-size: 0.9rem;
            border: 1px solid rgba(56, 189, 248, 0.4);
            padding: 6px 14px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .edit-link:hover {
            background: rgba(56, 189, 248, 0.15);
            border-color: #38bdf8;
            color: #ffffff;
        }

        /* 削除ボタン */
        .delete-btn {
            color: #fca5a5;
            background: transparent;
            border: 1px solid rgba(248, 113, 113, 0.4);
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .delete-btn:hover {
            background: rgba(248, 113, 113, 0.15);
            border-color: #f87171;
            color: #ffffff;
        }

        .empty-message {
            color: #9ca3af;
            text-align: center;
            padding: 40px 0;
        }

        .follow-btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .follow-btn:hover {
            background: #1d4ed8;
        }

        .unfollow-btn {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 6px 14px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .unfollow-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>👤 登録ユーザー一覧</h2>

        <div th:replace="~{header :: common-header(~{:: .user-links})}">
            <!-- この中身が引数としてヘッダー側に送り込まれる -->
             <th:block class="user-links">
                <a th:href="@{/users/new}" class="nav-links">➕ 新しいユーザーを登録する</a>
             </th:block>
        </div>

        <div th:if="${#lists.isEmpty(users)}" class="empty-message">
            <p>登録されているユーザーはいません。</p>
        </div>

        <div th:each="user : ${users}" class="user-card">
            
            <div class="user-info">
                <div class="user-meta">
                    <span class="user-icon" th:text="${user.icon}"></span>
                    <span class="user-name" th:text="${user.name}"></span>
                    <span class="user-badge" th:text="'ID: ' + ${user.id}">ID: 1</span>
                </div>
                <span class="user-email" th:text="${user.email}">email@example.com</span>
            </div>
            
            <div class="user-actions">
                <div th:if="${loginUser != null && loginUser.id != user.id}">
                    
                    <form th:if="${loginUser.following.contains(user)}" th:action="@{/users/{id}/unfollow(id=${user.id})}" method="post" style="margin: 0;">
                        <button type="submit" class="unfollow-btn">
                            🤝 フォロー中
                        </button>
                    </form>

                    <form th:unless="${loginUser.following.contains(user)}" th:action="@{/users/{id}/follow(id=${user.id})}" method="post" style="margin: 0;">
                        <button type="submit" class="follow-btn">
                            ➕ フォロー
                        </button>
                    </form>
                </div>
                <a th:href="@{/users/edit/{id}(id=${user.id})}" class="edit-link">編集</a>

                <form th:action="@{/users/delete/{id}(id=${user.id})}" method="post" style="margin: 0;">
                    <button type="submit" class="delete-btn" onclick="return confirm('本当に削除してもよろしいですか？');">
                        削除
                    </button>
                </form>
            </div>
            
        </div>
    </div>
</body>
</html>
