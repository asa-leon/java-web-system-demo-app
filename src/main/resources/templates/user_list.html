<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>ユーザー一覧</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="container">
        <h2>👤 登録ユーザー一覧</h2>

        <div th:replace="~{header :: common-header(~{:: .user-links})}">
            <!-- この中身が引数としてヘッダー側に送り込まれる -->
            <th:block class="user-links">
                <a th:href="@{/users/new}" class="nav-links add-user">➕ <span class="smaller">新規ユーザー登録</span></a>
            </th:block>
        </div>

        <div th:if="${#lists.isEmpty(users)}" class="empty-message">
            <p>登録されているユーザーはいません。</p>
        </div>

        <div th:each="user : ${users}" class="user-card">

            <div class="user-info">
                <div class="user-meta">
                    <span class="user-icon" th:text="${user.icon}"></span>
                    <span class="user-name"><a th:href="@{/users/{id}(id=${user.id})}" th:text="${user.name}"></a></span>
                    <span class="user-badge" th:text="'ID: ' + ${user.id}">ID: 1</span>
                </div>
                <span class="user-email" th:text="${user.email}">email@example.com</span>
            </div>

            <div class="user-actions">
                <!-- 自分以外のユーザーの時：フォロー／フォロー解除ボタンをひょうじ -->
                <div th:if="${loginUser != null && loginUser.id != user.id}">

                    <form th:if="${followedUserIds.contains(user.id)}"
                        th:action="@{/users/{id}/unfollow(id=${user.id})}" method="post" style="margin: 0;">
                        <button type="submit" class="unfollow-btn">
                            🤝 フォロー中
                        </button>
                    </form>

                    <form th:unless="${followedUserIds.contains(user.id)}"
                        th:action="@{/users/{id}/follow(id=${user.id})}" method="post" style="margin: 0;">
                        <button type="submit" class="follow-btn">
                            ➕ フォロー
                        </button>
                    </form>
                </div>

                <!-- 自分自身のユーザーの時だけ：編集・削除ボタンを表示 -->
                <div th:if="${loginUser != null && loginUser.id == user.id}" class="edit-delete-btns-wrapper">

                    <a th:href="@{/users/edit/{id}(id=${user.id})}" class="edit-link">編集</a>

                    <form th:action="@{/users/delete/{id}(id=${user.id})}" method="post" style="margin: 0;">
                        <button type="submit" class="delete-btn" onclick="return confirm('本当に削除してもよろしいですか？');">
                            削除
                        </button>
                    </form>

                </div>

            </div>

        </div>
    </div>
</body>

</html>
