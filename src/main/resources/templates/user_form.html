<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>ユーザー新規登録</title>
    </head>
    <body>
        <h1>ユーザー新規登録</h1>

        <form th:action="${user.id == null} ? @{/users/create} : @{/users/update}" th:object="${user}" method="post">

            <input type="hidden" th:field="*{id}"> <!-- ID用の隠し属性 -->

            <div>
                <label for="name">名前：</label>
                <input type="text" id="name" th:field="*{name}" required />
                <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color: red;"></p>
            </div>
            
            <br>

            <div>
                <label for="email">メールアドレス：</label>
                <input type="email" id="email" th:field="*{email}" required />
                <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color: red;"></p>
            </div>

            <br>

            <button type="submit">登録する</button>
        </form>

        <br>

        <a th:href="@{/users}">一覧に戻る</a>
    </body>
</html>
