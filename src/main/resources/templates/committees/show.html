<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title th:text="${committee.name} + ' - 机上院'">委員会詳細 - 机上院</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

	<div class="container wide-layout">

		<header th:replace="~{header :: common-header(~{})}"></header>

		<main id="main-content">

			<!-- 委員会タイトル・概要 -->
			<div class="committee-detail-header">
				<h2>
					<i th:class="'bi ' + ${committee.icon}"></i>
					<span th:text="${committee.name}">内閣・行政改革委員会</span>
				</h2>
				<p class="subtitle" th:text="${committee.description}">
					委員会の説明文がここに入ります。
				</p>
			</div>

			<!-- 所属法案一覧エリア -->
			<div class="card-container">
				<h3>
					<i class="bi bi-file-earmark-text"></i> 所属法案一覧
				</h3>

				<p th:if="${#lists.isEmpty(bills)}" class="no-content">
					現在、この委員会に提出されている法案はありません。
				</p>

				<!-- 法案一覧リスト（タイムラインと完全同一の post-card 構造に統一） -->
				<div class="timeline-list" th:unless="${#lists.isEmpty(bills)}">
					<div th:each="bill : ${bills}" class="post-card no-shadow">
						
						<!-- ヘッダー（ユーザー名・ID・ステータスバッジ・投稿日時） -->
						<div class="post-header">
							<span class="user-name">
								<div class="user-avatar-area">
									<div class="user-avatar">
										<img th:if="${bill.user != null && bill.user.avatarUrl != null}"
											th:src="${bill.user.avatarUrl}" alt="icon">
										<span th:if="${bill.user == null || bill.user.avatarUrl == null}">👤</span>
									</div>
									<a th:href="@{/users/{id}(id=${bill.user.id})}" th:text="${bill.user.name}"></a>
								</div>
							</span>
							<span class="user-id" th:text="'(ID: ' + ${bill.user.id} + ')'"></span>

							<!-- ステータスバッジ -->
							<span th:text="${bill.status.displayName}" class="status-badge"
								th:classappend="(
									${bill.status.name() == 'UNDER_DELIBERATION'} 
									? 'under-deliberation'
									: (
										${bill.status.name() == 'PASSED'}
										? 'passed'
										: ''
									)
								)">
							</span>

							<span class="post-time"
								th:text="${#temporals.format(bill.createdAt, 'yyyy/MM/dd（E）HH:mm')}"></span>
						</div>

						<!-- 本文エリア（タイトル：水色 / 説明文：適切な余白とフォントサイズ） -->
						<div class="post-content-container">
							<a th:href="@{/bills/{id}(id=${bill.id})}" class="whole-text-anchor"></a>
							<div class="post-content-text">
								<h3 th:text="${bill.title}" class="bill-title"></h3>
								<p th:text="${bill.description}" class="bill-description"></p>
							</div>
						</div>

						<!-- アクションエリア（いいね・投票ボタン） -->
						<div class="post-actions">
							<button type="button" class="like-button" th:data-bill-id="${bill.id}"
								th:classappend="${bill.likedByMe} ? 'liked' : ''">
								<span class="like-icon" th:text="${bill.likedByMe} ? '❤️' : '🖤'">🖤</span>
								<span class="like-count" th:text="${bill.likeCount}">0</span>
							</button>

							<button type="button" class="vote-button" th:data-bill-id="${bill.id}"
								th:data-is-own="${loginUser != null && bill.user.id == loginUser.id}"
								th:classappend="${bill.votedByMe} ? 'voted' : ''">
								<span class="vote-icon" th:text="${bill.votedByMe} ? '★' : '☆'">☆</span>
								<span class="vote-count" th:text="${bill.voteCount}">0</span>
							</button>
						</div>

					</div>
				</div>
			</div>

			<div class="nav-back">
				<a th:href="@{/committees}">🔙 委員会一覧に戻る</a>
			</div>
		</main>

		<aside id="sidebar">
			<div class="trend-card">
				<h3 class="trend-title">⚡ いまのトレンド</h3>
				<p th:if="${#lists.isEmpty(trends)}" class="no-trends">まだトレンドはありません。</p>
				<div th:each="t : ${trends}" class="trend-item">
					<a th:href="@{/tags/{tagName}(tagName=${t.name})}" class="trend-link" th:text="'#' + ${t.name}"></a>
				</div>
			</div>
		</aside>
	</div>

	<script th:src="@{/js/global.js}"></script>
</body>

</html>
