spring.application.name=javaWebSystem

# Thymeleaf(HTML)のキャッシュをオフにする（開発時のみ）
spring.thymeleaf.cache=false

# 静的リソース（CSS/JS）のキャッシュもオフにする
spring.devtools.livereload.enabled=true

# 全体のログレベルをINFOに設定
logging.level.root=INFO

# 自分の作ったパッケージだけDEBUGレベルにする
logging.level.com.example.demo=DEBUG

# H2コンソールを有効にする
spring.h2.console.enabled=true
# ブラウザからアクセスするパス
spring.h2.console.path=/h2-console
# DBの接続先（メモリ上に保存）
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# 実行されたSQLがターミナルで見える様にする
spring.jpa.show-sql=true

debug=true

# 起動時の膨大なレポートを出さない様にする
logging.level.org.springframework.boot.autoconfigure.logging.ConditionEvaluationReportLogger=OFF

# ==========================================
# Database Connection (MySQL)
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/kijoin_test?useSSL=false&serverTimezone=Asia/Tokyo&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=mysqlN0K@r@ted0
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / Hibernate Settings
# ==========================================
# 開発中はEntityクラスから自動的にテーブルを作成／変更させるために 'update' に設定する。
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true

# スクリプトを改行ではなくセミコロン単位で実行する設定
spring.jpa.properties.hibernate.hbm2ddl.import_files_sql_extractor=org.hibernate.tool.schema.internal.script.MultiLineSqlScriptExtractor

# SQLをコンソールに出力してデバッグしやすくする。
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# MySql用の最適SQLを出力するためのダイアレクト設定
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# プロキシ（Nginx）から送られてくるヘッダー（X-Forwarded-Proto等）を信用する
server.forward-headers-starategy=framework